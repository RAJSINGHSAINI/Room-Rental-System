<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rent Your Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="../../CSS/message.css">
    <link rel="stylesheet" href="../../CSS/rentRoom/rent.css">
    <link rel="stylesheet" href="../../CSS/myRentRoom/style.css">

</head>

<body>
<div id="toast-container"></div>
    <!--  Navbar -->
    <div class="navbar">
        <h2 class="logo">Room Rental</h2>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="../Profile/profile.html">Profile</a>
            <a id="logout" href="#">Logout</a>
        </div>
    </div>

    <div class="container">
        <h2>Your Rented Rooms</h2>
        <div class="room-container">
            <div class="owner-booking-card">

              
                <div class="user-section">
                    <h3 class="user-name">Raj Singh</h3>
                    <p class="user-email">raj@email.com</p>
                    <p class="user-phone">+91 9876543210</p>
                </div>

                <div class="booking-section">
                    <p><strong>Check-In:</strong> 20 Mar 2026</p>
                    <p><strong>Check-Out:</strong> 25 Mar 2026</p>
                    <p><strong>Total Days:</strong> 5</p>
                    <p><strong>Total Price:</strong> ₹7500</p>
                </div>

                <div class="status-section">

                    <label>Status</label>
                    <h4>Current Status: Confirmed</h4>
                    <select class="status-select">
                        <option value="confirmed">Confirmed</option>
                        <option value="checked-in">Checked-in</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>

                    <button class="save-status-btn">Save</button>

                </div>

            </div>
        </div>
    </div>

</body>
<script src="../../JavaScript/message.js"></script>
<script src="../../JavaScript/myRentedRoom/script.js"></script>

</html>
